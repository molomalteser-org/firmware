name: Build CyberPi Bruce Firmware

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '**.h'
      - '**.ini'
      - '.github/workflows/Cyberpi.yml'
  workflow_dispatch: # Erlaubt den manuellen Start unter dem "Actions" Tab

jobs:
  build_cyberpi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run PlatformIO Build
        # Wir nutzen genau den Namen aus deiner [env:CyberPi] Definition
        run: pio run -e CyberPi

      - name: Upload Firmware Binary
        uses: actions/upload-artifact@v4
        with:
          name: Bruce-CyberPi-v1
          path: |
            .pio/build/CyberPi/firmware.bin
            .pio/build/CyberPi/partitions.bin
