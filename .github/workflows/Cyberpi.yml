name: Build CyberPi Bruce Firmware

on:
  push:
    branches:
      - main
    paths:
      - '**.cpp'
      - '**.h'
      - '**.ini'
      - '.github/workflows/cyberpi.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch: # Erlaubt das manuelle Starten des Builds

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware for CyberPi (CYD-2USB)
        run: pio run -e CYD-2USB

      - name: Upload Build Artifact
        uses: upload-artifact@v4
        with:
          name: Bruce-CyberPi-Firmware
          path: |
            .pio/build/CYD-2USB/firmware.bin
            .pio/build/CYD-2USB/partitions.bin
            /Users/marlin/firmware/Bruce-CYD-2USB.bin
          # Hinweis: Der Pfad zum fertigen Merge-Bin hängt davon ab, 
          # wo PlatformIO es im Runner ablegt. Meistens ist es im Projekt-Root.
