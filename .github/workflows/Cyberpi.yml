name: Build CyberPi Bruce Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware
        run: pio run -e CYD-2USB

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bruce-CyberPi-Bin
          path: |
            .pio/build/CYD-2USB/firmware.bin
            Bruce-*.bin
