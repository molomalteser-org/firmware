##################################### CYBERPI MODELS ####################################################
[CyberPi_base]
board = esp32dev
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/CYD-2432S028>
build_flags =
    ${env.build_flags}
    ${env_4mb.build_flags}
    -Iboards/CYD-2432S028
    
    -DCYD=1             ; GhostESP Core-Logik aktivieren
    -DDEVICE_NAME='"CyberPi-Bruce"'
    
    ; --- DISPLAY SETUP (ST7789 128x128) ---
    -U ILI9341_DRIVER   ; Deaktiviere Standard-CYD Treiber
    -D ST7789_DRIVER=1  ; CyberPi nutzt ST7789
    -D TFT_WIDTH=128
    -D TFT_HEIGHT=128
    -D TFT_INVERSION_ON
    -D ROTATION=0       ; CyberPi Standard Ausrichtung
    
    ; --- SPI PINS (Display) ---
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=27
    -D TFT_RST=33
    -D TFT_BL=26        ; Backlight Steuerung
    
    ; --- I2C & IO EXPANDER (Joystick & LEDs) ---
    -D I2C_SDA=21
    -D I2C_SCL=22
    -D IO_EXPANDER_AW9523=1
    -D IO_EXPANDER_ADDR=0x58
    
    ; Joystick Mapping für AW9523
    -D IO_EXP_UP=4
    -D IO_EXP_DOWN=5
    -D IO_EXP_LEFT=6
    -D IO_EXP_RIGHT=7
    -D IO_EXP_SEL=8
    
    ; --- MEMORY FIXES (IRAM PROTECTION) ---
    -D CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1
    -D CONFIG_ESP_WIFI_IRAM_OPT=n
    -D CONFIG_ESP_WIFI_RX_IRAM_OPT=n

    ; --- ADDITIONAL CYBERPI FEATURES ---
    -DHAS_SCREEN=1
    -DHAS_TOUCH=0       ; CyberPi hat keinen Touchscreen
    -DHAS_BTN=0         ; Tasten laufen über den Expander
    -DUSER_SETUP_LOADED=1
    -DSMOOTH_FONT=1

; --- Das eigentliche CyberPi Environment ---
[env:CyberPi]
extends = CyberPi_base
build_flags =
    ${CyberPi_base.build_flags}
    -DSPI_FREQUENCY=40000000
    -D BRUCE_VERSION='"CyberPi-v1"'

; --- CyberPi Launcher Version (Light für M5Launcher) ---
[env:LAUNCHER_CyberPi]
extends = CyberPi_base
board_build.partitions = custom_4Mb.csv
build_flags =
    ${CyberPi_base.build_flags}
    ${env_light.build_flags}
lib_deps =
    ${env_light.lib_deps}
################################# END OF CYBERPI ####################################################
