[env:CyberPi]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = esp32dev
framework = arduino
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/CyberPi>

build_flags =
    ${env.build_flags}
    ${env_4mb.build_flags}
    -Iboards/CyberPi
    ; --- FIX: KEINE LEERZEICHEN NACH -U ---
    -UILI9341_DRIVER
    -UBRUCE_VERSION
    
    ; --- HARDWARE SETUP ---
    -DST7789_DRIVER=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=128
    -DTFT_INVERSION_ON
    -DDEVICE_NAME=\"CyberPi-Bruce\"
    -DBRUCE_VERSION=\"CyberPi-v1\"
    
    ; --- PINS ---
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=27
    -DTFT_RST=33
    -DTFT_BL=26
    -DI2C_SDA=21
    -DI2C_SCL=22
    
    ; --- EXPANDER & JOYSTICK ---
    -DIO_EXPANDER_AW9523=1
    -DIO_EXPANDER_ADDR=0x58
    -DIO_EXP_UP=4
    -DIO_EXP_DOWN=5
    -DIO_EXP_LEFT=6
    -DIO_EXP_RIGHT=7
    -DIO_EXP_SEL=8
    
    ; --- MEMORY ---
    -DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1
    -DCONFIG_ESP_WIFI_IRAM_OPT=n
    -DCONFIG_ESP_WIFI_RX_IRAM_OPT=n
