[env:lilygo-t-embed]
; Der CyberPi nutzt den ESP32 (Classic), daher board = esp32dev
board = esp32dev
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
; Wir nutzen den CyberPi-Ordner für die Hardware-Logik
build_src_filter = ${env.build_src_filter} +<../boards/CyberPi>
build_flags =
	${env.build_flags}
	-Iboards/CyberPi
	-Ilib
	-Ilib/HAL/io_expander
	-Os
	-DCORE_DEBUG_LEVEL=1
	
	; --- CYBERPI HARDWARE REDEFINITIONS ---
	; Reihenfolge: Erst löschen, dann mit sicherem String-Format neu setzen
	-UILI9341_DRIVER
	-UBRUCE_VERSION
	-DDEVICE_NAME='"CyberPi-Bruce"'
	-DBRUCE_VERSION='"CyberPi-v1"'
	
	; Display & Treiber
	-DST7789_DRIVER=1
	-DTFT_WIDTH=128
	-DTFT_HEIGHT=128
	-DTFT_INVERSION_ON
	-DROTATION=0
	
	; Pins (SPI & I2C)
	-DTFT_MOSI=23
	-DTFT_SCLK=18
	-DTFT_CS=5
	-DTFT_DC=27
	-DTFT_RST=33
	-DTFT_BL=26
	-DI2C_SDA=21
	-DI2C_SCL=22
	
	; Expander & Joystick (AW9523)
	-DIO_EXPANDER_AW9523=1
	-DIO_EXPANDER_ADDR=0x58
	-DIO_EXP_UP=4
	-DIO_EXP_DOWN=5
	-DIO_EXP_LEFT=6
	-DIO_EXP_RIGHT=7
	-DIO_EXP_SEL=8

	; Infrared & RF Pins (CyberPi Grove/Header Pins)
	-DIR_TX_PINS='{{"Pin 22", 22}}'
	-DIR_RX_PINS='{{"Pin 22", 22}}'
	-DRF_TX_PINS='{{"Pin 22", 22}}'
	-DRF_RX_PINS='{{"Pin 22", 22}}'

	; Speicher-Fix für Classic ESP32
	-DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1
	-DCONFIG_ESP_WIFI_IRAM_OPT=n
	-DCONFIG_ESP_WIFI_RX_IRAM_OPT=n

lib_deps =
	${env.lib_deps}
